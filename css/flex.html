<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display:block;
            background-color:rgb(64, 199, 134);
            width: 100px;
        }
        .inline{
            display:inline;
            background-color:rgb(49, 49, 225);
            width: 100px;
        }
        .inlineblock{
            display:inline-block;
            background-color:aquamarine;
            width: 100px;
        }
        span{
            display:inline;
            background-color:blanchedalmond;
            width:100px;
        }
        .navbar{
            background-color:burlywood;
            display:flex;
            flex-direction:row;
            justify-content:space-between;
            align-items:center;
            padding:20px;
        }
        .list{
            
            list-style:none;
        }
        .link{
            text-decoration:none;
            color:black;
            padding:10px;
            background-color:brown;
            border-radius:10px;
        }
        .link:hover{
            cursor:pointer;
            background-color: crimson;
            color: chocolate;
        }
    </style>
</head>

    <nav>
        <ul class="navbar">

        <li class="list"><a href=""class="link">service</a></li>
        </ul>
    </nav>

    <p class=" inline">Lorem ipsum dolor sit, amet consectetur adipisicing elit. </p>
    <p class="inlineblock">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    <span>Lorem ipsum dolor sit amet consectetur adipisicing elit.</span>
</body>
</html>
